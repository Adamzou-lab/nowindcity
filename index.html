<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO principal -->
  <title>nowindcity — Carte des villes sans vent en France</title>
  <meta name="description" content="Découvrez les villes les moins venteuses de France grâce à notre carte interactive. Comparez le vent en temps réel dans 30 grandes villes françaises. Idéal pour les cheveux bouclés !" />
  <meta name="keywords" content="villes sans vent France, carte vent France, ville calme vent, vent France carte, moins venteux France, météo vent villes" />
  <meta name="author" content="nowindcity" />
  <link rel="canonical" href="https://nowindcity.fr/" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nowindcity.fr/" />
  <meta property="og:title" content="nowindcity — Carte des villes sans vent en France" />
  <meta property="og:description" content="Trouvez les villes les moins venteuses de France. Carte interactive avec score Frizz en temps réel pour 30 grandes villes." />
  <meta property="og:image" content="https://nowindcity.fr/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:site_name" content="nowindcity" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://nowindcity.fr/" />
  <meta name="twitter:title" content="nowindcity — Carte des villes sans vent en France" />
  <meta name="twitter:description" content="Trouvez les villes les moins venteuses de France. Carte interactive avec score Frizz en temps réel pour 30 grandes villes." />
  <meta name="twitter:image" content="https://nowindcity.fr/og-image.png" />

  <!-- Schema.org JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "nowindcity",
    "url": "https://nowindcity.fr/",
    "description": "Carte interactive des villes les moins venteuses de France. Compare le vent en temps réel dans 30 grandes villes grâce au score Frizz.",
    "applicationCategory": "WeatherApplication",
    "operatingSystem": "All",
    "inLanguage": "fr-FR",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "EUR"
    },
    "keywords": "villes sans vent France, carte vent France, ville calme vent"
  }
  </script>

  <!-- Préconnexion polices Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">

      <div class="sidebar-header">
        <div class="logo-wrapper">
          <div class="logo-icon">💨</div>
          <div>
            <h1 class="app-title">nowindcity</h1>
            <p class="app-subtitle">Les villes les moins venteuses de France</p>
          </div>
        </div>
      </div>

      <div class="sidebar-inner">
        <div class="sidebar-actions">
          <button id="btn-analyser" class="btn-primary">Analyser les vents</button>
          <p id="status-message" class="text-sm mt-sm" style="color: var(--sky-500)"></p>
        </div>

        <p class="section-title mt-md">Classement des villes</p>
        <div id="city-list" class="cities-list"></div>
      </div>

      <div class="legend">
        <p class="legend-title">Score Frizz</p>
        <div class="legend-items">
          <div class="legend-item">
            <span class="legend-dot" style="background:#0ea5e9"></span>
            0–2 · Paradis 😇
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#38bdf8"></span>
            3–4 · Calme 😊
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#f59e0b"></span>
            5–6 · Modéré 😐
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#f97316"></span>
            7–8 · Venteux 😬
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#ef4444"></span>
            9–10 · Tempête 😱
          </div>
        </div>
      </div>

    </aside>

    <!-- Carte Leaflet -->
    <div id="map"></div>

  </div>

  <!-- Fallback pour les crawlers sans JS -->
  <noscript>
    <div style="font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #0c4a6e;">
      <h1>nowindcity — Carte des villes sans vent en France</h1>
      <p>
        nowindcity est une carte interactive qui compare le vent en temps réel dans les 30 plus grandes villes de France.
        Chaque ville reçoit un <strong>score Frizz</strong> (0 à 10) calculé à partir de la vitesse du vent et des rafales.
        Plus le score est bas, moins il y a de vent — idéal pour trouver une ville calme, notamment pour les personnes aux cheveux bouclés.
      </p>
      <p>
        Villes analysées : Paris, Marseille, Lyon, Toulouse, Nice, Nantes, Strasbourg, Montpellier, Bordeaux, Lille,
        Rennes, Reims, Toulon, Grenoble, Dijon, Angers, Nîmes, Le Mans, Aix-en-Provence, Brest,
        Tours, Amiens, Limoges, Besançon, Orléans, Metz, Rouen, Mulhouse, Perpignan, Caen.
      </p>
      <p>Données météo fournies par <a href="https://open-meteo.com">Open-Meteo</a> (gratuit, sans clé API).</p>
      <p><strong>Activez JavaScript pour accéder à la carte interactive.</strong></p>
    </div>
  </noscript>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Scripts de l'application (ordre important : api → map → ui) -->
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
